name: Build & push container to ACR

# Builds the Docker image and pushes it to Azure Container Registry using the
# registry's ADMIN credentials (username/password) — no Azure RBAC role
# assignment required, so a Contributor-only account is enough. Deploy is a
# manual step in the portal (Container App → Edit and deploy → :latest) until
# the account has role-assignment rights to automate it.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   ACR_LOGIN_SERVER          e.g. clliquidityacr.azurecr.io
#   ACR_USERNAME              from ACR → Access keys (Admin user)
#   ACR_PASSWORD              from ACR → Access keys (Admin user)
#   NEXT_PUBLIC_SUPABASE_URL  public Supabase URL (inlined into the client bundle)

on:
  push:
    branches: ["historical=and-auction-data"]
    paths-ignore:
      - "**/*.md"
      - "azure-sql/**"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/lqdt-web:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/lqdt-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
